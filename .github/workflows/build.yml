name: GitHub Stats and README Update

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "*/5 * * * *"  # Every 5 minutes for both jobs
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    name: Build and Generate Stats Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'
          cache: 'pip'

      - name: Install requirements
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install -r requirements.txt

      - name: Generate images
        run: python3 generate_images.py
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXCLUDE_FORKED_REPOS: true

      - name: Commit stats images
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m 'Update stats images' || echo "No changes to commit"
          git push --force-with-lease

  update_readme:
    name: Update README with Recent Activity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
